<h2>Invoice Form</h2>

<form [formGroup]="invoiceForm">

    <label>Customer</label>

    <input
        type="text"
        formControlName="customer">

    <br><br>

    <label>Amount</label>

    <input
        type="text"
        formControlName="amount">

    <br><br>

    <button
        type="button"
        (click)="save()">

        Save Invoice

    </button>

</form>

<br>

<h3>{{message}}</h3>
